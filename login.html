<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parent Login — BloxStudy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="form-page">

  <div class="form-card">
    <div class="form-card-header">
      <a href="index.html" class="logo" style="justify-content:center; color:#fff; margin-bottom:16px;">
        <div class="logo-mark">B</div>
        BloxStudy
      </a>
      <h1>Welcome Back</h1>
      <p>Sign in to your parent account</p>
    </div>

    <div class="form-card-body">
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
          <div class="form-error" id="email-error">Please enter a valid email address.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <div class="form-error" id="password-error">Password is required.</div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"/> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Sign In
        </button>

      </form>

      <div class="form-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const btn  = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validateLogin()) return;

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        await Auth.signIn(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        showToast('✅ Signed in! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        const msgs = {
          NotAuthorizedException:    'Incorrect email or password.',
          UserNotFoundException:     'No account found with that email.',
          UserNotConfirmedException: 'Please verify your email first — check your inbox.'
        };
        showToast('❌ ' + (msgs[err.code] || 'Sign in failed. Please try again.'), 'error');
      }
    });

    function validateLogin() {
      let valid = true;
      const email    = document.getElementById('email');
      const password = document.getElementById('password');

      clearErrors();

      if (!email.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
        showError('email-error', email);
        valid = false;
      }
      if (!password.value) {
        showError('password-error', password);
        valid = false;
      }
      return valid;
    }

    function showError(id, input) {
      document.getElementById(id).classList.add('show');
      input.classList.add('error');
    }

    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
      document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));
    }
  </script>
</body>
</html>
