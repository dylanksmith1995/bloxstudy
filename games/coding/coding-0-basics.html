<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Basics — BloxStudy</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07091a;
      --panel: #0d1530;
      --border: #1e3560;
      --accent: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #4e6585;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fredoka One', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 54px;
      background: linear-gradient(90deg, #0a1228 0%, #0f1d3a 100%);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 1.2rem; color: var(--accent); }
    #hdr-center { display: flex; align-items: center; gap: 10px; }
    #level-badge {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.82rem;
    }
    .ldot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); margin: 0 4px; }
    .ldot.done { background: var(--green); }
    .ldot.cur { background: var(--accent); }

    #main { flex: 1; display: grid; grid-template-columns: 1fr 420px; overflow: hidden; }
    #maze-panel {
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #0d1e40 0%, #07091a 70%);
      padding: 20px; overflow: hidden;
    }
    #maze-canvas { border-radius: 12px; border: 2px solid var(--border); background: #020617; }

    #code-panel {
      display: flex; flex-direction: column;
      background: var(--panel); border-left: 2px solid var(--border);
      padding: 18px; gap: 14px; overflow-y: auto;
    }
    .panel-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; }
    #lesson-text { font-family: 'Nunito', sans-serif; font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; }
    #controls-box { display: flex; flex-direction: column; gap: 10px; }
    
    .btn { border: none; border-radius: 10px; padding: 12px 16px; font-family: 'Fredoka One', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.15s ease; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.08); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .btn-secondary { background: #0f1d38; color: #7ea8d8; border: 1.5px solid var(--border); }
    .btn-warning { background: #1a0f00; color: #f97316; border: 1.5px solid #7c3a00; }

    #arrow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    #block-palette { display: flex; flex-wrap: wrap; gap: 8px; background: #08162d; border: 1px solid var(--border); border-radius: 10px; padding: 10px; min-height: 50px; }
    #block-sequence { min-height: 60px; background: #08162d; border: 2px dashed var(--border); border-radius: 10px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-content: flex-start; }
    .block { padding: 8px 12px; background: #0f1d38; border: 1px solid #1e3560; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #7dd3fc; cursor: grab; white-space: nowrap; }
    .block.dragging { opacity: 0.3; }
    .block.from-palette { cursor: grab; }
    .block.in-sequence { cursor: pointer; }
    .in-sequence-placeholder { color: #6b7280; font-style: italic; }

    #code-display { background: #020617; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #7dd3fc; line-height: 1.6; min-height: 60px; }

    #output-log { background: #040d1c; border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #7dd3fc; min-height: 50px; max-height: 100px; overflow-y: auto; }
    .log-info { color: #38bdf8; }
    .log-ok { color: #4ade80; }
    .log-error { color: #f87171; }

    .action-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    /* Modals */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.show { display: flex; }
    .modal-card { background: linear-gradient(135deg, var(--panel) 0%, #111e3a 100%); border: 2px solid var(--border); border-radius: 16px; padding: 32px; width: 90%; max-width: 420px; }
    .modal-card h2 { font-size: 1.4rem; margin-bottom: 12px; }
    .modal-card p { color: #94a3b8; line-height: 1.7; margin-bottom: 16px; font-family: 'Nunito', sans-serif; }
    .modal-card ul { margin-left: 16px; color: #cbd5e1; }
    .modal-card li { margin-bottom: 8px; font-family: 'Nunito', sans-serif; }
    .modal-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    .modal-btn { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Fredoka One', sans-serif; transition: all 0.15s; }
    .modal-btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: #000; }
    .modal-btn-primary:hover { transform: translateY(-1px); }
    .modal-btn-secondary { background: #0f1d38; color: #7ea8d8; border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div id="hdr">
    <div class="logo">🤖 Code Basics</div>
    <div id="hdr-center">
      <span id="level-badge">Level 1</span>
      <div style="display: flex; gap: 4px;">
        <div class="ldot cur" id="dot-0"></div>
        <div class="ldot" id="dot-1"></div>
        <div class="ldot" id="dot-2"></div>
        <div class="ldot" id="dot-3"></div>
      </div>
    </div>
    <div style="font-size: 0.75rem; color: #2e4a6e;">BloxStudy</div>
  </div>

  <div id="main">
    <div id="maze-panel">
      <canvas id="maze-canvas" width="480" height="360"></canvas>
    </div>

    <div id="code-panel">
      <div class="panel-label">📖 Lesson</div>
      <div id="lesson-text">Loading...</div>

      <div class="panel-label" style="margin-top: 8px;">🎮 Controls</div>
      <div id="controls-box"></div>

      <div class="panel-label" style="margin-top: 8px;">📊 Output</div>
      <div id="output-log"><span class="log-info">Ready to start!</span></div>
    </div>
  </div>

  <!-- Hint Modal -->
  <div id="hint-modal" class="modal">
    <div class="modal-card">
      <h2>Hint</h2>
      <ul id="hint-list"></ul>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-secondary" onclick="closeHint()">Close</button>
      </div>
    </div>
  </div>

  <!-- Answer Modal -->
  <div id="answer-modal" class="modal">
    <div class="modal-card">
      <h2>Show Answer?</h2>
      <p>This is for learning. Try the hint first!</p>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-secondary" onclick="closeAnswer()">Not yet</button>
        <button class="modal-btn modal-btn-primary" onclick="revealAnswer()">Show it</button>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div id="win-modal" class="modal">
    <div class="modal-card">
      <h2 id="win-title">Great job!</h2>
      <p id="win-msg">Blox made it to the star!</p>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-secondary" onclick="nextLevel()">Next level →</button>
      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // GAME STATE & CONFIG
    // ─────────────────────────────────────────────────────────────
    const GRID_SIZE = 80;
    const LEVELS = [
      {
        id: 0,
        title: 'What is a Computer?',
        lessonText: 'Computers need instructions to know what to do. Help Blox find the star by pressing arrow buttons.',
        mode: 'arrows',
        startX: 1, startY: 4,
        goalX: 4, goalY: 1,
        solution: ['right', 'right', 'up'],
        hints: [
          'Press the right arrow to move Blox to the right.',
          'Keep pressing until Blox reaches the star.',
          'Commands happen one at a time.'
        ]
      },
      {
        id: 1,
        title: 'One Thing After Another',
        lessonText: 'Drag the blocks into the sequence box, in order. Then press Run Code.',
        mode: 'blocks',
        startX: 1, startY: 4,
        goalX: 4, goalY: 1,
        solution: ['right', 'right', 'up'],
        hints: [
          'Drag each block from the left into the sequence box.',
          'The order matters!',
          'Press Run Code to execute the sequence.'
        ]
      },
      {
        id: 2,
        title: 'Different Commands',
        lessonText: 'Click direction buttons to build a sequence of commands. Find the right path!',
        mode: 'buttons',
        startX: 1, startY: 4,
        goalX: 4, goalY: 1,
        solution: ['right', 'up', 'right'],
        hints: [
          'Click Right, Up, Left, or Down to add commands.',
          'Each click adds to your sequence.',
          'Click a command in the sequence to remove it.'
        ]
      },
      {
        id: 3,
        title: 'Code is Just Words',
        lessonText: 'Drag blocks into the sequence and watch the text code appear. Code is just words!',
        mode: 'text',
        startX: 1, startY: 4,
        goalX: 4, goalY: 1,
        solution: ['right', 'up', 'right'],
        hints: [
          'The text shows what your blocks mean.',
          'Code is just instructions written as words.',
          'Drag blocks, then press Run Code.'
        ]
      }
    ];

    let currentLevel = 0;
    let gameState = { bloxX: 0, bloxY: 0, path: [], executing: false, sequence: [] };
    let draggedBlock = null;

    // ─────────────────────────────────────────────────────────────
    // CANVAS RENDERING
    // ─────────────────────────────────────────────────────────────
    const canvas = document.getElementById('maze-canvas');
    const ctx = canvas.getContext('2d');

    function drawGrid() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= 6; x++) {
        ctx.beginPath(); ctx.moveTo(x * GRID_SIZE, 0); ctx.lineTo(x * GRID_SIZE, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= 4; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * GRID_SIZE); ctx.lineTo(canvas.width, y * GRID_SIZE); ctx.stroke();
      }
    }

    function drawStar(x, y) {
      ctx.fillStyle = 'rgba(74,222,128,0.2)';
      ctx.fillRect(x * GRID_SIZE + 8, y * GRID_SIZE + 8, GRID_SIZE - 16, GRID_SIZE - 16);
      ctx.font = '40px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#4ade80';
      ctx.fillText('⭐', x * GRID_SIZE + GRID_SIZE / 2, y * GRID_SIZE + GRID_SIZE / 2);
    }

    function drawBlox(x, y) {
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(x * GRID_SIZE + 14, y * GRID_SIZE + 14, 52, 52);
      // eyes
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(x * GRID_SIZE + 22, y * GRID_SIZE + 24, 14, 12);
      ctx.fillRect(x * GRID_SIZE + 44, y * GRID_SIZE + 24, 14, 12);
      // pupils
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(x * GRID_SIZE + 26, y * GRID_SIZE + 26, 6, 8);
      ctx.fillRect(x * GRID_SIZE + 48, y * GRID_SIZE + 26, 6, 8);
      // smile
      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x * GRID_SIZE + GRID_SIZE / 2, y * GRID_SIZE + 45, 12, 0, Math.PI);
      ctx.stroke();
    }

    function drawPath(path) {
      if (path.length === 0) return;
      ctx.strokeStyle = 'rgba(56,189,248,0.4)';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      let x = gameState.bloxX, y = gameState.bloxY;
      ctx.moveTo(x * GRID_SIZE + GRID_SIZE / 2, y * GRID_SIZE + GRID_SIZE / 2);
      path.forEach(dir => {
        if (dir === 'right') x++;
        else if (dir === 'left') x--;
        else if (dir === 'up') y--;
        else if (dir === 'down') y++;
        ctx.lineTo(x * GRID_SIZE + GRID_SIZE / 2, y * GRID_SIZE + GRID_SIZE / 2);
      });
      ctx.stroke();
    }

    function render() {
      const level = LEVELS[currentLevel];
      drawGrid();
      drawPath(gameState.path);
      drawStar(level.goalX, level.goalY);
      drawBlox(gameState.bloxX, gameState.bloxY);
    }

    // ─────────────────────────────────────────────────────────────
    // GAME LOGIC
    // ─────────────────────────────────────────────────────────────
    function moveBlox(dir) {
      const level = LEVELS[currentLevel];
      let newX = gameState.bloxX, newY = gameState.bloxY;
      if (dir === 'right') newX++;
      else if (dir === 'left') newX--;
      else if (dir === 'up') newY--;
      else if (dir === 'down') newY++;

      if (newX < 0 || newX > 5 || newY < 0 || newY > 4) {
        logOutput('Out of bounds! Try again.', 'error');
        return false;
      }
      gameState.bloxX = newX;
      gameState.bloxY = newY;
      gameState.path.push(dir);
      render();

      if (gameState.bloxX === level.goalX && gameState.bloxY === level.goalY) {
        setTimeout(winLevel, 300);
      }
      return true;
    }

    function executeSequence() {
      if (gameState.executing) return;
      const seq = gameState.sequence;
      if (seq.length === 0) {
        logOutput('Add commands first!', 'error');
        return;
      }
      gameState.executing = true;
      logOutput('Executing...', 'info');
      let i = 0;
      const interval = setInterval(() => {
        if (i >= seq.length) {
          clearInterval(interval);
          gameState.executing = false;
          return;
        }
        moveBlox(seq[i]);
        i++;
      }, 400);
    }

    function addCommand(dir) {
      gameState.sequence.push(dir);
      renderSequence();
      if (LEVELS[currentLevel].mode === 'text') renderCodeDisplay();
    }

    function removeCommand(idx) {
      gameState.sequence.splice(idx, 1);
      renderSequence();
      if (LEVELS[currentLevel].mode === 'text') renderCodeDisplay();
    }

    function winLevel() {
      const level = LEVELS[currentLevel];
      document.getElementById('win-title').textContent = currentLevel === 3 ? 'Amazing! 🌟' : 'Great job! 🎉';
      document.getElementById('win-msg').textContent = currentLevel === 3 ? 'You learned the coding basics. You\'re ready for Code Quest!' : 'Level ' + (currentLevel + 1) + ' complete!';
      document.getElementById('win-modal').classList.add('show');
      logOutput('Level complete!', 'ok');
    }

    function nextLevel() {
      document.getElementById('win-modal').classList.remove('show');
      if (currentLevel < LEVELS.length - 1) {
        currentLevel++;
        initLevel();
      } else {
        window.location.href = 'coding-1-code-quest.html';
      }
    }

    function resetLevel() {
      const level = LEVELS[currentLevel];
      gameState = { bloxX: level.startX, bloxY: level.startY, path: [], executing: false, sequence: [] };
      renderSequence();
      renderCodeDisplay();
      logOutput('Level reset!', 'info');
      render();
    }

    // ─────────────────────────────────────────────────────────────
    // UI RENDERING
    // ─────────────────────────────────────────────────────────────
    function renderLevelUI() {
      const level = LEVELS[currentLevel];
      document.getElementById('level-badge').textContent = 'Level ' + (currentLevel + 1);
      document.getElementById('lesson-text').textContent = level.lessonText;
      
      // Update dots
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.className = 'ldot';
        if (i === currentLevel) dot.classList.add('cur');
        if (i < currentLevel) dot.classList.add('done');
      }

      const controlsBox = document.getElementById('controls-box');
      controlsBox.innerHTML = '';

      if (level.mode === 'arrows') {
        renderArrowControls();
      } else if (level.mode === 'blocks' || level.mode === 'text') {
        renderBlockControls();
      } else if (level.mode === 'buttons') {
        renderButtonControls();
      }
    }

    function renderArrowControls() {
      const controlsBox = document.getElementById('controls-box');
      const grid = document.createElement('div');
      grid.id = 'arrow-grid';
      
      const blank1 = document.createElement('div');
      const upBtn = createBtn('↑ Up', function() { moveBlox('up'); });
      const blank2 = document.createElement('div');
      const leftBtn = createBtn('← Left', function() { moveBlox('left'); });
      const rightBtn = createBtn('Right →', function() { moveBlox('right'); });
      const blank3 = document.createElement('div');
      const downBtn = createBtn('↓ Down', function() { moveBlox('down'); });
      const blank4 = document.createElement('div');

      grid.append(blank1, upBtn, blank2, leftBtn, rightBtn, blank3, downBtn, blank4);
      controlsBox.append(grid);

      const actionBox = document.createElement('div');
      actionBox.className = 'action-buttons';
      actionBox.append(
        createBtn('Reset', resetLevel, 'btn-secondary'),
        createBtn('Hint', openHint, 'btn-secondary')
      );
      controlsBox.append(actionBox);
    }

    function renderBlockControls() {
      const controlsBox = document.getElementById('controls-box');
      
      const label = document.createElement('div');
      label.className = 'panel-label';
      label.textContent = '🧩 Blocks';
      controlsBox.append(label);

      const palette = document.createElement('div');
      palette.id = 'block-palette';
      LEVELS[currentLevel].solution.forEach(function(cmd) {
        const block = createBlockElement(cmd, 'from-palette');
        block.addEventListener('dragstart', dragStart);
        palette.append(block);
      });
      controlsBox.append(palette);

      const seqLabel = document.createElement('div');
      seqLabel.className = 'panel-label';
      seqLabel.textContent = '📝 Sequence';
      controlsBox.append(seqLabel);

      const sequence = document.createElement('div');
      sequence.id = 'block-sequence';
      sequence.addEventListener('dragover', function(e) { e.preventDefault(); });
      sequence.addEventListener('drop', dragDrop);
      renderSequence(sequence);
      controlsBox.append(sequence);

      if (LEVELS[currentLevel].mode === 'text') {
        const codeLabel = document.createElement('div');
        codeLabel.className = 'panel-label';
        codeLabel.textContent = '💻 Code';
        controlsBox.append(codeLabel);

        const codeDisplay = document.createElement('div');
        codeDisplay.id = 'code-display';
        controlsBox.append(codeDisplay);
        renderCodeDisplay(codeDisplay);
      }

      const actionBox = document.createElement('div');
      actionBox.className = 'action-buttons';
      actionBox.append(
        createBtn('Run Code', executeSequence, 'btn-primary'),
        createBtn('Reset', resetLevel, 'btn-secondary'),
        createBtn('Hint', openHint, 'btn-secondary'),
        createBtn('Answer', openAnswer, 'btn-warning')
      );
      controlsBox.append(actionBox);
    }

    function renderButtonControls() {
      const controlsBox = document.getElementById('controls-box');
      
      const btnBox = document.createElement('div');
      btnBox.style.display = 'grid';
      btnBox.style.gridTemplateColumns = 'repeat(2, 1fr)';
      btnBox.style.gap = '8px';
      var dirs = ['right', 'left', 'up', 'down'];
      dirs.forEach(function(dir) {
        btnBox.append(createBtn(dir.toUpperCase(), function() { addCommand(dir); }, 'btn-primary'));
      });
      controlsBox.append(btnBox);

      const seqLabel = document.createElement('div');
      seqLabel.className = 'panel-label';
      seqLabel.style.marginTop = '12px';
      seqLabel.textContent = '📝 Sequence';
      controlsBox.append(seqLabel);

      const sequence = document.createElement('div');
      sequence.id = 'block-sequence';
      renderSequence(sequence);
      controlsBox.append(sequence);

      const actionBox = document.createElement('div');
      actionBox.className = 'action-buttons';
      actionBox.append(
        createBtn('Run Code', executeSequence, 'btn-primary'),
        createBtn('Reset', resetLevel, 'btn-secondary'),
        createBtn('Hint', openHint, 'btn-secondary'),
        createBtn('Answer', openAnswer, 'btn-warning')
      );
      controlsBox.append(actionBox);
    }

    function renderSequence(sequenceEl) {
      var seq = sequenceEl || document.getElementById('block-sequence');
      if (!seq) return;
      seq.innerHTML = '';
      if (gameState.sequence.length === 0) {
        seq.innerHTML = '<span class="in-sequence-placeholder">Commands appear here</span>';
      } else {
        gameState.sequence.forEach(function(cmd, idx) {
          var block = createBlockElement(cmd, 'in-sequence');
          block.onclick = function() { removeCommand(idx); };
          seq.append(block);
        });
      }
    }

    function renderCodeDisplay(display) {
      var codeEl = display || document.getElementById('code-display');
      if (!codeEl) return;
      var lines = gameState.sequence.map(function(cmd) { return cmd + '();'; }).join('\n');
      codeEl.textContent = lines || '// Build your sequence';
    }

    function createBlockElement(text, cls) {
      var el = document.createElement('div');
      el.className = 'block ' + cls;
      el.textContent = text.toUpperCase();
      el.dataset.command = text;
      return el;
    }

    function createBtn(text, onClick, cls) {
      if (!cls) cls = 'btn-primary';
      var btn = document.createElement('button');
      btn.className = 'btn ' + cls;
      btn.textContent = text;
      btn.addEventListener('click', onClick);
      return btn;
    }

    // ─────────────────────────────────────────────────────────────
    // DRAG & DROP
    // ─────────────────────────────────────────────────────────────
    function dragStart(e) {
      draggedBlock = e.target.dataset.command;
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', draggedBlock);
    }

    function dragDrop(e) {
      e.preventDefault();
      var cmd = e.dataTransfer.getData('text/plain');
      if (cmd) {
        addCommand(cmd);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // MODALS & OUTPUT
    // ─────────────────────────────────────────────────────────────
    function logOutput(msg, type) {
      if (!type) type = 'info';
      var log = document.getElementById('output-log');
      var cls = type === 'ok' ? 'log-ok' : type === 'error' ? 'log-error' : 'log-info';
      log.innerHTML = '<span class="' + cls + '">▶ ' + msg + '</span>';
    }

    function openHint() {
      var level = LEVELS[currentLevel];
      var list = document.getElementById('hint-list');
      list.innerHTML = '';
      level.hints.forEach(function(hint) {
        var li = document.createElement('li');
        li.textContent = hint;
        list.append(li);
      });
      document.getElementById('hint-modal').classList.add('show');
    }

    function closeHint() {
      document.getElementById('hint-modal').classList.remove('show');
    }

    function openAnswer() {
      document.getElementById('answer-modal').classList.add('show');
    }

    function closeAnswer() {
      document.getElementById('answer-modal').classList.remove('show');
    }

    function revealAnswer() {
      closeAnswer();
      var answer = LEVELS[currentLevel].solution;
      gameState.sequence = answer.slice();
      renderSequence();
      renderCodeDisplay();
      logOutput('Answer shown: ' + answer.join(' → '), 'info');
    }

    // ─────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────
    function initLevel() {
      var level = LEVELS[currentLevel];
      gameState = { bloxX: level.startX, bloxY: level.startY, path: [], executing: false, sequence: [] };
      renderLevelUI();
      logOutput('Level ' + (currentLevel + 1) + ': ' + level.title, 'info');
      render();
    }

    // Start game
    initLevel();
  </script>
</body>
</html>
