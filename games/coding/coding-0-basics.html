<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Basics — BloxStudy</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #07091a;
      --panel:   #0d1530;
      --panel2:  #111e3a;
      --border:  #1e3560;
      --accent:  #38bdf8;
      --green:   #4ade80;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --text:    #e2e8f0;
      --muted:   #4e6585;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fredoka One', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 54px;
      background: linear-gradient(90deg, #0a1228 0%, #0f1d3a 100%);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 1.15rem; color: var(--accent);
      text-shadow: 0 0 18px rgba(56,189,248,0.5);
    }
    #hdr-center { display: flex; align-items: center; gap: 10px; }
    #level-badge {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: white; padding: 4px 14px;
      border-radius: 20px; font-size: 0.82rem;
      box-shadow: 0 2px 10px rgba(99,102,241,0.4);
    }
    #level-title { font-size: 0.88rem; color: #7ea8d8; }
    #level-dots { display: flex; gap: 6px; align-items: center; }
    .ldot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); transition: background 0.3s, box-shadow 0.3s;
    }
    .ldot.done { background: var(--green);  box-shadow: 0 0 8px #4ade80; }
    .ldot.cur  { background: var(--accent); box-shadow: 0 0 8px #38bdf8; }

    /* ── Main ────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 450px;
      overflow: hidden;
      gap: 12px;
      padding: 12px;
    }

    /* ── Canvas area ─────────────────────────────────────────────── */
    #canvas-area {
      background: radial-gradient(ellipse at center, #0d1e40 0%, #07091a 70%);
      border: 2px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    #canvas-area::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.10) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.08) 0%, transparent 100%);
      pointer-events: none;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* ── Right panel ─────────────────────────────────────────────── */
    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .panel-box {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      overflow: auto;
      flex: 1;
    }

    .panel-title {
      font-size: 0.95rem;
      color: var(--accent);
      margin-bottom: 12px;
      text-shadow: 0 0 12px rgba(56,189,248,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lesson-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 12px;
    }

    .code-example {
      background: #0a0e24;
      border: 1px solid #1e3560;
      border-radius: 6px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: var(--green);
      margin-bottom: 12px;
      overflow-x: auto;
      white-space: pre;
    }

    .control-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn {
      background: linear-gradient(135deg, var(--accent), #0ea5e9);
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(56,189,248,0.3);
      width: 100%;
      margin-bottom: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(56,189,248,0.5);
    }
    .btn:active { transform: translateY(0); }

    .btn-success {
      background: linear-gradient(135deg, var(--green), #22c55e);
      box-shadow: 0 4px 12px rgba(74,222,128,0.3);
    }
    .btn-success:hover {
      box-shadow: 0 6px 16px rgba(74,222,128,0.5);
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--yellow), #f59e0b);
      color: #1f2937;
      box-shadow: 0 4px 12px rgba(245,158,11,0.3);
    }
    .btn-warning:hover {
      box-shadow: 0 6px 16px rgba(245,158,11,0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .progress-section {
      background: linear-gradient(135deg, #111e3a 0%, #0d1530 100%);
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-hint {
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      color: var(--yellow);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ── Win modal ─────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #overlay.show { display: flex; }

    #modal {
      background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(56,189,248,0.2);
      animation: modalPop 0.4s ease-out;
    }

    @keyframes modalPop {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #modal-emoji {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }

    #modal-title {
      font-size: 1.6rem;
      color: var(--green);
      margin-bottom: 12px;
      text-shadow: 0 0 16px rgba(74,222,128,0.3);
    }

    #modal-msg {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-btn {
      background: linear-gradient(135deg, var(--green), #22c55e);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(74,222,128,0.3);
      width: 100%;
    }
    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(74,222,128,0.5);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="hdr">
    <div class="logo">🎓 BloxStudy</div>
    <div id="hdr-center">
      <div id="level-badge">Level <span id="level-num">1</span> of 4</div>
      <div id="level-title">Ready to learn?</div>
      <div id="level-dots">
        <div class="ldot cur" id="dot-0"></div>
        <div class="ldot" id="dot-1"></div>
        <div class="ldot" id="dot-2"></div>
        <div class="ldot" id="dot-3"></div>
      </div>
    </div>
    <a href="../../dashboard.html" style="color: var(--muted); font-size: 0.85rem; text-decoration: none; cursor: pointer;">← Back</a>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">
    <!-- Canvas -->
    <div id="canvas-area">
      <canvas id="c" width="600" height="500"></canvas>
    </div>

    <!-- Right Panel -->
    <div id="right-panel">
      <!-- Lesson -->
      <div class="panel-box">
        <div class="panel-title">📖 Lesson</div>
        <div id="lesson-content">
          <div class="lesson-text" id="les-text">Loading...</div>
          <div class="code-example" id="les-code"></div>
          <div class="progress-section">
            <div class="progress-label">💡 Hint</div>
            <div class="progress-hint" id="les-hint">Pay attention to the robot!</div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="panel-box" style="flex: unset;">
        <div class="panel-title">🎮 Actions</div>
        <div id="controls-area">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div id="overlay">
    <div id="modal">
      <div id="modal-emoji">🎉</div>
      <div id="modal-title">Perfect!</div>
      <div id="modal-msg">You did it!</div>
      <button class="modal-btn" id="next-btn">Continue →</button>
    </div>
  </div>

  <script>
    // ── SETUP ────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // ── LEVELS ───────────────────────────────────────────────────────
    const LEVELS = [
      {
        title: 'First Steps',
        desc: 'Meet Blox! Press a button to move forward.',
        hint: 'You\'ve got one button. Try it!',
        code: 'move()',
        controls: ['move'],
        targetX: 500,
        startX: 100,
      },
      {
        title: 'Two Moves',
        desc: 'Press both buttons in order to reach the goal.',
        hint: 'First button, then second button. You\'ve got this!',
        code: 'move()\nmove()',
        controls: ['move', 'move'],
        targetX: 300,
        startX: 100,
      },
      {
        title: 'Three Moves',
        desc: 'Press all three buttons to reach the goal.',
        hint: 'Same pattern — just keep going forward!',
        code: 'move()\nmove()\nmove()',
        controls: ['move', 'move', 'move'],
        targetX: 450,
        startX: 100,
      },
      {
        title: 'Master Basics!',
        desc: 'Four moves to the goal. You\'re ready for Code Quest!',
        hint: 'You know this pattern by now!',
        code: 'move()\nmove()\nmove()\nmove()',
        controls: ['move', 'move', 'move', 'move'],
        targetX: 500,
        startX: 100,
      },
    ];

    let levelIdx = 0;
    let robotX = LEVELS[0].startX;
    let moveCount = 0;

    // ── DRAW ─────────────────────────────────────────────────────────
    function draw() {
      // Clear
      ctx.fillStyle = 'rgba(7, 9, 26, 0.8)';
      ctx.fillRect(0, 0, W, H);

      // Ground
      ctx.fillStyle = '#1e3560';
      ctx.fillRect(0, H - 80, W, 80);

      // Goal marker
      const level = LEVELS[levelIdx];
      ctx.fillStyle = 'rgba(74, 222, 128, 0.3)';
      ctx.fillRect(level.targetX - 40, H - 100, 80, 100);
      ctx.fillStyle = '#4ade80';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🎯', level.targetX, H - 70);

      // Robot
      drawRobot(robotX, H - 100);

      // Glow effect around robot
      ctx.strokeStyle = `rgba(56, 189, 248, ${moveCount > 0 ? 0.6 : 0.2})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(robotX + 20, H - 80, 50, 0, Math.PI * 2);
      ctx.stroke();

      // Info text
      ctx.fillStyle = '#7ea8d8';
      ctx.font = '13px Nunito';
      ctx.textAlign = 'left';
      ctx.fillText(`Progress: ${moveCount}/${level.controls.length}`, 20, 30);
    }

    function drawRobot(x, y) {
      // Head
      ctx.fillStyle = '#38bdf8';
      ctx.fillRect(x + 5, y - 30, 30, 30);
      // Eye
      ctx.fillStyle = '#0a0e24';
      ctx.fillRect(x + 10, y - 25, 8, 8);
      // Body
      ctx.fillStyle = '#0ea5e9';
      ctx.fillRect(x, y, 40, 25);
      // Wheel
      ctx.fillStyle = '#1e3560';
      ctx.beginPath();
      ctx.arc(x + 10, y + 30, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + 30, y + 30, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }

    // ── LEVEL LOGIC ──────────────────────────────────────────────────
    function loadLevel() {
      const level = LEVELS[levelIdx];
      
      // Update header
      document.getElementById('level-num').textContent = levelIdx + 1;
      document.getElementById('level-title').textContent = level.title;
      
      // Update lesson
      document.getElementById('les-text').textContent = level.desc;
      document.getElementById('les-code').textContent = level.code;
      document.getElementById('les-hint').textContent = level.hint;

      // Update controls
      const controlsArea = document.getElementById('controls-area');
      controlsArea.innerHTML = '';
      level.controls.forEach((action, idx) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.textContent = `${idx + 1}️⃣ Move Forward`;
        btn.onclick = () => performAction(action, idx);
        btn.disabled = idx !== moveCount || moveCount >= level.controls.length;
        btn.dataset.idx = idx;
        controlsArea.appendChild(btn);
      });

      // Update dots
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.className = 'ldot' + (i < levelIdx ? ' done' : i === levelIdx ? ' cur' : '');
      }

      // Reset robot
      robotX = level.startX;
      moveCount = 0;
      draw();
    }

    function performAction(action, expectedIdx) {
      if (action !== 'move' || expectedIdx !== moveCount) return;

      // Move robot
      robotX += 100;
      moveCount++;

      // Animate
      const animDuration = 400;
      const startX = robotX - 100;
      const startTime = Date.now();

      function animFrame() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / animDuration, 1);
        robotX = startX + (100 * progress);
        draw();

        if (progress < 1) {
          requestAnimationFrame(animFrame);
        } else {
          robotX = startX + 100;
          draw();
          updateControlButtons();

          // Check win
          const level = LEVELS[levelIdx];
          if (moveCount === level.controls.length && robotX >= level.targetX - 30) {
            setTimeout(showWin, 400);
          }
        }
      }
      animFrame();
    }

    function updateControlButtons() {
      const level = LEVELS[levelIdx];
      document.querySelectorAll('#controls-area .btn').forEach((btn, idx) => {
        btn.disabled = idx !== moveCount || moveCount >= level.controls.length;
      });
    }

    function showWin() {
      localStorage.setItem('bs_game_completed_coding-0-basics', 'true');
      document.getElementById('modal-emoji').textContent = '🎉';
      document.getElementById('modal-title').textContent = levelIdx === 3 ? 'You\'re Ready!' : 'Great Job!';
      document.getElementById('modal-msg').textContent = levelIdx === 3 
        ? 'You\'ve mastered the basics. Ready for Code Quest?' 
        : 'Next level unlocked!';
      document.getElementById('next-btn').textContent = levelIdx === 3 ? '🚀 Continue to Code Quest' : 'Next Level →';
      document.getElementById('overlay').classList.add('show');
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      document.getElementById('overlay').classList.remove('show');
      if (levelIdx < LEVELS.length - 1) {
        levelIdx++;
        loadLevel();
      } else {
        window.location.href = '../../dashboard.html';
      }
    });

    // ── INIT ─────────────────────────────────────────────────────────
    loadLevel();
  </script>

</body>
</html>
