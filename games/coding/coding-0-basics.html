<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Basics — BloxStudy</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #04060f;
      --panel:   #0a0f22;
      --panel2:  #0f1629;
      --border:  #1a2e52;
      --accent:  #00d4ff;
      --accent2: #0099dd;
      --green:   #00ff88;
      --red:     #ff4466;
      --amber:   #ffaa00;
      --text:    #e8eef8;
      --muted:   #7a8fa8;
      --dark:    #030609;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, var(--dark) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Fredoka One', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    #hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      background: linear-gradient(90deg, rgba(10,15,34,0.8) 0%, rgba(15,22,41,0.8) 100%);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
      font-weight: 700;
    }

    #hdr-center {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      justify-content: center;
    }

    #level-badge {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #000;
      padding: 6px 16px;
      border-radius: 24px;
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: 0 0 16px rgba(0,212,255,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    #level-title {
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    #level-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .ldot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
    }

    .ldot.done {
      background: var(--green);
      box-shadow: 0 0 12px rgba(0,255,136,0.5);
    }

    .ldot.cur {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(0,212,255,0.6);
      transform: scale(1.2);
    }

    #hdr-back {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s;
      padding: 6px 12px;
      border-radius: 6px;
    }

    #hdr-back:hover {
      background: var(--panel);
      color: var(--accent);
    }

    /* ── MAIN LAYOUT ─────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
    }

    /* ── CANVAS AREA ─────────────────────────────────────────────── */
    #canvas-container {
      background: linear-gradient(135deg, rgba(15,22,41,0.6) 0%, rgba(10,15,34,0.6) 100%);
      border: 2px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    #canvas-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(0,212,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(0,255,136,0.06) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 15%, rgba(0,212,255,0.06) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,170,0,0.04) 0%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      display: block;
      position: relative;
      z-index: 2;
      max-width: 100%;
      max-height: 100%;
    }

    /* ── RIGHT PANEL ─────────────────────────────────────────────── */
    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      min-width: 0;
    }

    .panel-box {
      background: linear-gradient(135deg, rgba(10,15,34,0.8) 0%, rgba(15,22,41,0.8) 100%);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      overflow: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .panel-box::-webkit-scrollbar {
      width: 6px;
    }

    .panel-box::-webkit-scrollbar-track {
      background: transparent;
    }

    .panel-box::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 0.95rem;
      color: var(--accent);
      margin-bottom: 14px;
      text-shadow: 0 0 12px rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .lesson-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .code-block {
      background: linear-gradient(135deg, rgba(3,6,15,0.8) 0%, rgba(10,15,34,0.6) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--green);
      margin-bottom: 14px;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.6;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
    }

    .hint-box {
      background: linear-gradient(135deg, rgba(255,170,0,0.1) 0%, rgba(255,170,0,0.05) 100%);
      border-left: 3px solid var(--amber);
      padding: 10px 12px;
      border-radius: 6px;
      margin-top: 12px;
    }

    .hint-label {
      font-size: 0.7rem;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .hint-text {
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
    }

    /* ── CONTROLS ────────────────────────────────────────────────── */
    #controls-box {
      flex: unset;
      max-height: fit-content;
    }

    #controls-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-btn {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #000;
      border: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(0,212,255,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.1);
      transition: left 0.3s;
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,212,255,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .action-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0,212,255,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .action-btn.completed {
      background: linear-gradient(135deg, var(--green) 0%, #00cc66 100%);
      color: #000;
      box-shadow: 0 4px 12px rgba(0,255,136,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--green) 100%);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px rgba(0,212,255,0.4);
    }

    /* ── MODAL ───────────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    #overlay.show {
      display: flex;
    }

    #modal {
      background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 50px 60px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,212,255,0.2), 0 0 40px rgba(0,255,136,0.1);
      animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalPop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    #modal-emoji {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    #modal-title {
      font-size: 1.8rem;
      color: var(--green);
      margin-bottom: 14px;
      text-shadow: 0 0 20px rgba(0,255,136,0.3);
      font-weight: 700;
    }

    #modal-msg {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 28px;
      line-height: 1.7;
      font-weight: 500;
    }

    .modal-btn {
      background: linear-gradient(135deg, var(--green) 0%, #00cc66 100%);
      color: #000;
      border: none;
      padding: 14px 40px;
      border-radius: 8px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 16px rgba(0,255,136,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,255,136,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .modal-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="hdr">
    <div class="logo">🎓 BloxStudy</div>
    <div id="hdr-center">
      <div id="level-badge">Level <span id="level-num">1</span>/4</div>
      <div id="level-title">Learn Coding Basics</div>
      <div id="level-dots">
        <div class="ldot cur" id="dot-0"></div>
        <div class="ldot" id="dot-1"></div>
        <div class="ldot" id="dot-2"></div>
        <div class="ldot" id="dot-3"></div>
      </div>
    </div>
    <a href="../../dashboard.html" id="hdr-back">← Back</a>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- CANVAS -->
    <div id="canvas-container">
      <canvas id="c" width="900" height="560"></canvas>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel">
      <!-- LESSON -->
      <div class="panel-box">
        <div class="panel-title">📖 Lesson</div>
        <div class="lesson-text" id="les-text">Loading...</div>
        <div class="code-block" id="les-code"></div>
        <div class="hint-box">
          <div class="hint-label">💡 Hint</div>
          <div class="hint-text" id="les-hint">Pay attention to what happens on the screen!</div>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="panel-box" id="controls-box">
        <div class="panel-title">🎮 Actions</div>
        <div id="controls-area"></div>
        <div class="progress-info">
          <span id="prog-text">0/1 actions</span>
          <div style="flex:1; margin: 0 10px;">
            <div class="progress-bar">
              <div class="progress-fill" id="prog-bar" style="width:0%"></div>
            </div>
          </div>
          <span id="prog-pct">0%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="overlay">
    <div id="modal">
      <div id="modal-emoji">🎉</div>
      <div id="modal-title">Perfect!</div>
      <div id="modal-msg">You did it!</div>
      <button class="modal-btn" id="next-btn">Continue →</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // ── PARTICLES ────────────────────────────────────────────────
    const particles = [];

    class Particle {
      constructor(x, y, vx, vy, color, size) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size;
        this.life = 1;
        this.decay = 0.98;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life *= this.decay;
      }

      draw(ctx) {
        ctx.fillStyle = this.color.replace(')', `, ${this.life})`).replace('rgb', 'rgba');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function createParticles(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 2 + Math.random() * 3;
        particles.push(new Particle(
          x + Math.cos(angle) * 10,
          y + Math.sin(angle) * 10,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          color,
          2 + Math.random() * 2
        ));
      }
    }

    // ── LEVELS ──────────────────────────────────────────────────
    const LEVELS = [
      {
        title: 'First Steps',
        desc: 'Meet Blox! Press the button below to move forward.',
        hint: 'Tap "Move Forward" and watch what happens!',
        code: 'move()',
        actions: [{ type: 'move', label: 'Move Forward' }],
        goal: 400,
        startX: 100,
      },
      {
        title: 'Two Moves',
        desc: 'Press the button twice to reach the goal.',
        hint: 'Press the same button again. Keep going!',
        code: 'move()\nmove()',
        actions: [
          { type: 'move', label: 'Move Forward' },
          { type: 'move', label: 'Move Forward' },
        ],
        goal: 300,
        startX: 100,
      },
      {
        title: 'Mix It Up',
        desc: 'Now you have two actions! Turn first, then move forward.',
        hint: 'Try turning before moving!',
        code: 'turn()\nmove()',
        actions: [
          { type: 'turn', label: 'Turn Right' },
          { type: 'move', label: 'Move Forward' },
        ],
        goal: 400,
        startX: 100,
        startDir: 90,
      },
      {
        title: 'Master the Basics!',
        desc: 'Use both actions to reach the goal. You\'re ready for Code Quest!',
        hint: 'Combine turns and moves to navigate!',
        code: 'turn()\nmove()\nturn()\nmove()',
        actions: [
          { type: 'turn', label: 'Turn Right' },
          { type: 'move', label: 'Move Forward' },
          { type: 'turn', label: 'Turn Right' },
          { type: 'move', label: 'Move Forward' },
        ],
        goal: 500,
        startX: 100,
        startDir: 90,
      },
    ];

    let levelIdx = 0;
    let robotX = LEVELS[0].startX;
    let robotY = H / 2;
    let robotDir = 0;
    let actionIdx = 0;
    let animating = false;

    // ── DRAW ─────────────────────────────────────────────────────
    function draw() {
      // Background
      ctx.fillStyle = 'rgba(4,6,15,0.3)';
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = 'rgba(26,46,82,0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < W; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, H);
        ctx.stroke();
      }

      // Ground line
      ctx.strokeStyle = 'rgba(26,46,82,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, H / 2 + 60);
      ctx.lineTo(W, H / 2 + 60);
      ctx.stroke();

      // Goal
      const level = LEVELS[levelIdx];
      ctx.fillStyle = 'rgba(0,255,136,0.15)';
      ctx.fillRect(level.goal - 50, H / 2 - 80, 100, 160);
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🎯', level.goal, H / 2);

      // Particles
      particles.forEach((p, i) => {
        p.update();
        p.draw(ctx);
        if (p.life < 0.1) particles.splice(i, 1);
      });

      // Robot
      drawRobot(robotX, robotY, robotDir);

      // Info
      ctx.fillStyle = '#7a8fa8';
      ctx.font = '14px Nunito';
      ctx.textAlign = 'left';
      ctx.fillText(`Progress: ${actionIdx}/${level.actions.length}`, 20, 30);
    }

    function drawRobot(x, y, dir) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate((dir * Math.PI) / 180);

      // Glow
      ctx.fillStyle = 'rgba(0,212,255,0.1)';
      ctx.beginPath();
      ctx.arc(0, 0, 60, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = '#0099dd';
      ctx.fillRect(-20, -25, 40, 50);

      // Head
      ctx.fillStyle = '#00d4ff';
      ctx.beginPath();
      ctx.arc(0, -35, 15, 0, Math.PI * 2);
      ctx.fill();

      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(5, -37, 4, 0, Math.PI * 2);
      ctx.fill();

      // Direction indicator
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.moveTo(0, -50);
      ctx.lineTo(-8, -35);
      ctx.lineTo(8, -35);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // ── GAME LOGIC ───────────────────────────────────────────────
    function loadLevel() {
      const level = LEVELS[levelIdx];

      document.getElementById('level-num').textContent = levelIdx + 1;
      document.getElementById('les-text').textContent = level.desc;
      document.getElementById('les-code').textContent = level.code;
      document.getElementById('les-hint').textContent = level.hint;

      // Build action buttons
      const controlsArea = document.getElementById('controls-area');
      controlsArea.innerHTML = '';

      level.actions.forEach((action, idx) => {
        const btn = document.createElement('button');
        btn.className = 'action-btn';
        btn.textContent = action.label;
        btn.disabled = idx > actionIdx;
        btn.onclick = () => performAction(action, idx);
        btn.dataset.idx = idx;
        controlsArea.appendChild(btn);
      });

      // Update level dots
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.className = 'ldot' + (i < levelIdx ? ' done' : i === levelIdx ? ' cur' : '');
      }

      // Reset
      robotX = level.startX;
      robotY = H / 2;
      robotDir = level.startDir || 0;
      actionIdx = 0;
      animating = false;
      updateProgress();
      draw();
    }

    function performAction(action, expectedIdx) {
      if (animating || expectedIdx !== actionIdx) return;

      animating = true;

      if (action.type === 'move') {
        moveRobot();
      } else if (action.type === 'turn') {
        turnRobot();
      }
    }

    function moveRobot() {
      const duration = 500;
      const startX = robotX;
      const startY = robotY;
      const startTime = Date.now();
      const dist = 100;

      function frame() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);

        const moveX = Math.cos((robotDir * Math.PI) / 180) * dist * progress;
        const moveY = Math.sin((robotDir * Math.PI) / 180) * dist * progress;

        robotX = startX + moveX;
        robotY = startY + moveY;

        draw();

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          robotX = startX + Math.cos((robotDir * Math.PI) / 180) * dist;
          robotY = startY + Math.sin((robotDir * Math.PI) / 180) * dist;
          draw();
          createParticles(robotX, robotY, 8, 'rgb(0,212,255)');

          finishAction();
        }
      }

      frame();
    }

    function turnRobot() {
      const duration = 400;
      const startTime = Date.now();
      const startDir = robotDir;

      function frame() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);

        robotDir = startDir + 90 * progress;

        draw();

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          robotDir = startDir + 90;
          draw();
          createParticles(robotX, robotY, 6, 'rgb(255,170,0)');

          finishAction();
        }
      }

      frame();
    }

    function finishAction() {
      actionIdx++;
      animating = false;

      setTimeout(() => {
        updateProgress();
        const level = LEVELS[levelIdx];

        if (actionIdx === level.actions.length) {
          checkWin();
        } else {
          const btns = document.querySelectorAll('.action-btn');
          btns.forEach((btn, i) => {
            btn.disabled = i >= actionIdx;
            if (i === actionIdx) btn.focus();
          });
        }

        draw();
      }, 200);
    }

    function updateProgress() {
      const level = LEVELS[levelIdx];
      const pct = Math.round((actionIdx / level.actions.length) * 100);

      document.getElementById('prog-text').textContent = `${actionIdx}/${level.actions.length} actions`;
      document.getElementById('prog-pct').textContent = `${pct}%`;
      document.getElementById('prog-bar').style.width = pct + '%';
    }

    function checkWin() {
      localStorage.setItem('bs_game_completed_coding-0-basics', 'true');

      const isLast = levelIdx === LEVELS.length - 1;
      document.getElementById('modal-emoji').textContent = isLast ? '🚀' : '⭐';
      document.getElementById('modal-title').textContent = isLast ? 'You\'re Ready!' : 'Level Complete!';
      document.getElementById('modal-msg').textContent = isLast
        ? 'You\'ve mastered the basics. Ready for Code Quest?'
        : 'Great job! Next level coming up...';
      document.getElementById('next-btn').textContent = isLast ? '🚀 Continue to Code Quest' : 'Next Level →';

      document.getElementById('overlay').classList.add('show');
    }

    document.getElementById('next-btn').addEventListener('click', () => {
      document.getElementById('overlay').classList.remove('show');

      if (levelIdx < LEVELS.length - 1) {
        levelIdx++;
        loadLevel();
      } else {
        window.location.href = '../../dashboard.html';
      }
    });

    loadLevel();
  </script>

</body>
</html>
